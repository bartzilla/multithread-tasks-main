spring.h2.console.enabled=true

# Running at 00:00 on day-of-month 24 in December
cron.cleanup.schedule=0 0 0 24 12 *

# Property for TimeUnit Enum: DAYS, HOURS, MINUTES, SECONDS
#time.unit=DAYS
#time.unit.duration=10

# Running every 10 seconds for testing purposes
#cron.cleanup.schedule=*/10 * * * * *

# For testing use: All not-executed tasks older than 10 seconds will be cleaned-up
time.unit=SECONDS
time.unit.duration=20

logging.level.com.bartzilla=INFO